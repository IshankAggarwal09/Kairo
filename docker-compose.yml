services:
  node-1:
    build: .
    container_name: node-1
    environment:
      - NODE_ID=node-1
      - NODE_PORT=8081
      - PEERS=node-1:node-1:8081,node-2:node-2:8082,node-3:node-3:8083
    ports:
      - "8081:8081"

  node-2:
    build: .
    container_name: node-2
    environment:
      - NODE_ID=node-2
      - NODE_PORT=8082
      - PEERS=node-1:node-1:8081,node-2:node-2:8082,node-3:node-3:8083
    ports:
      - "8082:8082"

  node-3:
    build: .
    container_name: node-3
    environment:
      - NODE_ID=node-3
      - NODE_PORT=8083
      - PEERS=node-1:node-1:8081,node-2:node-2:8082,node-3:node-3:8083
    ports:
      - "8083:8083"
